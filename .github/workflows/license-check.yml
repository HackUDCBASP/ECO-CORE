name: Godot Addons License & Lint Check

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check each addon has LICENSE
        run: |
          missing=false
          for dir in addons/*; do
            if [ -d "$dir" ] && [ ! -f "$dir/LICENSE" ]; then
              echo "Missing LICENSE in $dir"
              missing=true
            fi
          done
          if [ "$missing" = true ]; then
            exit 1
          fi

      - name: Install ScanCode Toolkit
        run: |
          pip install --upgrade pip
          pip install scancode-toolkit

      - name: Scan licenses
        run: |
          scancode --license --json licenses.json addons/

      - name: Fail if license is not allowed
        run: |
          ALLOWED="MIT|BSD-2-Clause|BSD-3-Clause|Apache-2.0|GPL-2.0|GPL-3.0"
          forbidden=$(grep -Po '"key": "\K[^"]+' licenses.json | grep -vE "$ALLOWED" || true)
          if [ -n "$forbidden" ]; then
            echo "Forbidden licenses detected: $forbidden"
            exit 1
          fi

      - name: Run gdlint
        run: |
          pip install gdtoolkit
          # Si no tienes gdlint.toml, gdlint usa defaults
          gdlint .