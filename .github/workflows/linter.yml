name: GDScript Linter

on:
  pull_request:
    branches: [ main, develop ]
  push:
    branches: [ main, develop ]

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'  # Versión estable

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-linter-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-linter-

      - name: Instalar gdtoolkit (versión fija)
        run: pip install gdtoolkit==4.4.0

      - name: Depurar configuración (opcional)
        run: |
          echo "=== Archivos de configuración ==="
          ls -la .gdlintrc* pyproject.toml 2>/dev/null || echo "No config files"
          echo "=== Contenido de .gdlintrc ==="
          cat .gdlintrc 2>/dev/null || echo "Archivo .gdlintrc no encontrado"

      - name: Ejecutar gdlint
        run: gdlint .